# =============================================================================
# Nginx Monitoring Configuration - stub_status endpoint
# =============================================================================
# Include this in nginx/nginx.conf or place in /etc/nginx/conf.d/
#
# Provides metrics for Prometheus scraping via nginx_exporter
# =============================================================================

server {
    listen 127.0.0.1:8080;
    server_name localhost;

    # Stub status module for metrics
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    # Health check endpoint (unauthenticated)
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
        add_header X-Nginx-Health "ok" always;
    }

    # Prometheus metrics endpoint (if using nginx-prometheus-exporter)
    location /metrics {
        proxy_pass http://127.0.0.1:9113/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }
}

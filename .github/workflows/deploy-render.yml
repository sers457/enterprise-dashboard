name: Deploy to Render

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "main"
  push:
    branches: [main]

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for previous Render deploys
        run: |
          echo "Checking for in-progress deployments..."
          sleep 5

      - name: Deploy backend service
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "clearCache": "do_not_clear"
            }' | jq -r '.id' > deploy-id.txt
          echo "Backend deploy ID: $(cat deploy-id.txt)"

      - name: Deploy frontend service
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "clearCache": "do_not_clear"
            }' | jq -r '.id'

      - name: Wait for backend deployment
        run: |
          DEPLOY_ID=$(cat deploy-id.txt)
          for i in $(seq 1 40); do
            STATUS=$(curl -s "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys/$DEPLOY_ID" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq -r '.status')
            echo "Deploy status: $STATUS (attempt $i/40)"
            if [ "$STATUS" = "live" ]; then
              echo "Deployment successful!"
              exit 0
            fi
            if [ "$STATUS" = "failed" ]; then
              echo "Deployment failed!"
              exit 1
            fi
            sleep 15
          done
          echo "Deployment timed out"
          exit 1

      - name: Health check
        run: |
          RENDER_URL="https://${{ secrets.RENDER_BACKEND_SERVICE_NAME }}.onrender.com"
          for i in $(seq 1 10); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" $RENDER_URL/api/health 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed at $RENDER_URL"
              exit 0
            fi
            echo "Waiting... attempt $i/10 (status: $HTTP_STATUS)"
            sleep 10
          done
          echo "Health check failed"
          exit 1

      - name: Notify
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && 'Render Deploy Succeeded' || 'Render Deploy Failed' }}: ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Render Deploy ${{ job.status == 'success' && 'Succeeded' || 'Failed' }}*\\nApp: ${{ github.repository }}\\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
